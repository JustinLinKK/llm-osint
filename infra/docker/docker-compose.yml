services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: osint
      POSTGRES_PASSWORD: osint
      POSTGRES_DB: osint
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osint -d osint"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7
    ports: ["6379:6379"]

  minio:
    image: minio/minio:latest
    command: server /data1 /data2 /data3 /data4 --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data1:/data1
      - minio_data2:/data2
      - minio_data3:/data3
      - minio_data4:/data4

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 20


  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]
    volumes: ["qdrant_data:/qdrant/storage"]

  worker-embedding:
    build:
      context: ../../
      dockerfile: services/worker-embedding/Dockerfile
    container_name: worker-embedding
    env_file:
      - ../../.env
    environment:
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      EMBEDDING_SERVED_MODEL_NAME: ${EMBEDDING_SERVED_MODEL_NAME}
      EMBEDDING_HOST: 0.0.0.0
      EMBEDDING_PORT: "8000"
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY}
      EMBEDDING_TRUST_REMOTE_CODE: ${EMBEDDING_TRUST_REMOTE_CODE}
      EMBEDDING_DTYPE: ${EMBEDDING_DTYPE}
      EMBEDDING_TASK: ${EMBEDDING_TASK}
      EMBEDDING_MAX_MODEL_LEN: ${EMBEDDING_MAX_MODEL_LEN}
      EMBEDDING_TENSOR_PARALLEL_SIZE: ${EMBEDDING_TENSOR_PARALLEL_SIZE}
      EMBEDDING_PIPELINE_PARALLEL_SIZE: ${EMBEDDING_PIPELINE_PARALLEL_SIZE}
      EMBEDDING_GPU_MEMORY_UTILIZATION: ${EMBEDDING_GPU_MEMORY_UTILIZATION}
      EMBEDDING_ENFORCE_SINGLE_MODEL: ${EMBEDDING_ENFORCE_SINGLE_MODEL}
      EMBEDDING_VLLM_ARGS: ${EMBEDDING_VLLM_ARGS}
    ports:
      - "8008:8000"
    shm_size: "4gb"
    gpus: all

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: "neo4j/neo4jpassword"
    ports: ["7474:7474", "7687:7687"]
    volumes: ["neo4j_data:/data"]

  temporal:
    image: temporalio/auto-setup:1.24
    depends_on: [postgres]
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=osint
      - POSTGRES_PWD=osint
      - POSTGRES_SEEDS=postgres
    ports: ["7233:7233"]

  temporal-ui:
    image: temporalio/ui:2.27.2
    depends_on: [temporal]
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    ports: ["8233:8080"]


  api:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    env_file:
      - ../../.env
    environment:
      API_PORT: "3000"
      DATABASE_URL: postgresql://osint:osint@postgres:5432/osint
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio12345
      MINIO_BUCKET: osint-raw
      LANGGRAPH_AUTOSTART: ${LANGGRAPH_AUTOSTART}
      LANGGRAPH_PYTHON_BIN: /opt/agent-venv/bin/python
      LANGGRAPH_SCRIPT_PATH: /app/services/agent-langgraph/src/run_planner.py
      LANGGRAPH_WORKDIR: /app
      LANGGRAPH_MAX_ITERATIONS: ${LANGGRAPH_MAX_ITERATIONS}
      MCP_SERVER_URL: http://mcp-server:3001/mcp
      MCP_SERVER_KALI_URL: http://mcp-server-kali:3002/mcp
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_started
      neo4j:
        condition: service_started
      mcp-server:
        condition: service_started
      mcp-server-kali:
        condition: service_started
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20

  mcp-server:
    build:
      context: ../../
      dockerfile: apps/mcp-server/Dockerfile
    env_file:
      - ../../.env
    environment:
      MCP_PORT: "3001"
      DATABASE_URL: postgresql://osint:osint@postgres:5432/osint
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio12345
      MINIO_BUCKET: osint-raw
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER}
      EMBEDDING_API_URL: ${EMBEDDING_API_URL}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: neo4jpassword
      PYTHON_BIN: /opt/mcp-venv/bin/python
      PATH: /opt/mcp-venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      MCP_PYTHON_TOOLS: "${MCP_PYTHON_TOOLS}"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_started
      neo4j:
        condition: service_started
      worker-embedding:
        condition: service_started
    ports:
      - "3001:3001"

  mcp-server-kali:
    build:
      context: ../../
      dockerfile: apps/mcp-server/Dockerfile.osint
    env_file:
      - ../../.env
    environment:
      MCP_PORT: "3002"
      DATABASE_URL: postgresql://osint:osint@postgres:5432/osint
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio12345
      MINIO_BUCKET: osint-raw
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER}
      EMBEDDING_API_URL: ${EMBEDDING_API_URL}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: neo4jpassword
      MCP_TOOLSET: "kali-osint"
      PYTHON_BIN: /opt/osint-venv/bin/python
      PATH: /opt/osint-venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_started
      neo4j:
        condition: service_started
      worker-embedding:
        condition: service_started
    ports:
      - "3002:3002"

  agent-langgraph:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql://osint:osint@postgres:5432/osint
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio12345
      MINIO_BUCKET: osint-raw
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: neo4jpassword
      MCP_SERVER_URL: http://mcp-server:3001/mcp
      MCP_SERVER_KALI_URL: http://mcp-server-kali:3002/mcp
      LANGGRAPH_PYTHON_BIN: /opt/agent-venv/bin/python
      LANGGRAPH_SCRIPT_PATH: /app/services/agent-langgraph/src/run_planner.py
      LANGGRAPH_WORKDIR: /app
      PYTHONPATH: /app/services/agent-langgraph/src
      LANGGRAPH_MAX_ITERATIONS: ${LANGGRAPH_MAX_ITERATIONS}
    working_dir: /app
    command: ["sh", "-lc", "tail -f /dev/null"]
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_started
      neo4j:
        condition: service_started
      mcp-server:
        condition: service_started
      mcp-server-kali:
        condition: service_started
    profiles: ["runner", "test"]

  pipeline-test:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql://osint:osint@postgres:5432/osint
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio12345
      MINIO_BUCKET: osint-raw
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: neo4jpassword
      MCP_SERVER_URL: http://mcp-server:3001/mcp
      MCP_SERVER_KALI_URL: http://mcp-server-kali:3002/mcp
      PYTHONPATH: /app/services/agent-langgraph/src
    working_dir: /app
    command: ["/opt/agent-venv/bin/python", "/app/services/agent-langgraph/src/run_pipeline_test.py", "--url", "http://example.com"]
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_started
      neo4j:
        condition: service_started
      mcp-server:
        condition: service_started
      mcp-server-kali:
        condition: service_started
    profiles: ["test"]


volumes:
  pgdata:
  minio_data1:
  minio_data2:
  minio_data3:
  minio_data4:
  qdrant_data:
  neo4j_data:
