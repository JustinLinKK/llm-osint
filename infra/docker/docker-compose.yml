services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: osint
      POSTGRES_PASSWORD: osint
      POSTGRES_DB: osint
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osint -d osint"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7
    ports: ["6379:6379"]

  minio:
    image: minio/minio:latest
    command: server /data1 /data2 /data3 /data4 --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data1:/data1
      - minio_data2:/data2
      - minio_data3:/data3
      - minio_data4:/data4

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 20


  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]
    volumes: ["qdrant_data:/qdrant/storage"]

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: "neo4j/neo4jpassword"
    ports: ["7474:7474", "7687:7687"]
    volumes: ["neo4j_data:/data"]

  temporal:
    image: temporalio/auto-setup:1.24
    depends_on: [postgres]
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=osint
      - POSTGRES_PWD=osint
      - POSTGRES_SEEDS=postgres
    ports: ["7233:7233"]

  temporal-ui:
    image: temporalio/ui:2.27.2
    depends_on: [temporal]
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    ports: ["8233:8080"]


  api:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    environment:
      API_PORT: "3000"
      DATABASE_URL: postgresql://osint:osint@postgres:5432/osint
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio12345
      MINIO_BUCKET: osint-raw
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "3000:3000"


volumes:
  pgdata:
  minio_data1:
  minio_data2:
  minio_data3:
  minio_data4:
  qdrant_data:
  neo4j_data:
